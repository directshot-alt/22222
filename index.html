<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인구 수업 2단계: 정책 시나리오 시뮬레이션</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --font-main: 'Pretendard', sans-serif; }
        body { font-family: var(--font-main); background-color: #f3f4f6; -webkit-font-smoothing: antialiased; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .btn-policy { transition: all 0.2s; border: 2px solid #e5e7eb; }
        .btn-policy:hover { border-color: #6366f1; background-color: #f5f3ff; }
        .btn-policy.active { border-color: #6366f1; background-color: #eff6ff; ring: 2px solid #6366f1; }
        .quest-item { word-break: keep-all; overflow-wrap: break-word; }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-900">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10">
            <div class="inline-block px-4 py-1 bg-rose-600 text-white text-xs font-bold rounded-full mb-3">인구수업 2단계</div>
            <h1 class="text-3xl font-extrabold mb-4 tracking-tight">정책 제안 및 효과 시뮬레이션</h1>
            <div class="card p-6 border-l-8 border-rose-500">
                <p class="text-slate-700 leading-relaxed quest-item">
                    <span class="font-bold text-slate-900">나. 정책 제안 인구:</span> 1단계에서 확인한 문제를 해결하기 위해 주거 지원, 출산 지원 등 다양한 정책을 적용해보고 그 효과를 비교해 봅시다.
                </p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="card p-6 shadow-sm border border-slate-200">
                    <h3 class="font-bold text-sm text-slate-500 mb-4 flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        정책 시나리오 선택
                    </h3>
                    <div class="space-y-3">
                        <button onclick="applyScenario('none')" id="btn-none" class="btn-policy active w-full p-4 rounded-xl text-left">
                            <span class="block font-bold text-slate-700 text-sm">현상 유지</span>
                            <span class="text-[11px] text-slate-500">아무런 정책을 시행하지 않음</span>
                        </button>
                        <button onclick="applyScenario('housing')" id="btn-housing" class="btn-policy w-full p-4 rounded-xl text-left">
                            <span class="block font-bold text-blue-600 text-sm">🏠 청년 주거 및 일자리 지원</span>
                            <span class="text-[11px] text-slate-500">청년 유입 증가 및 주거 안정</span>
                        </button>
                        <button onclick="applyScenario('birth')" id="btn-birth" class="btn-policy w-full p-4 rounded-xl text-left">
                            <span class="block font-bold text-rose-600 text-sm">👶 파격적 출산 장려 정책</span>
                            <span class="text-[11px] text-slate-500">직접적인 양육비 및 현금 지원</span>
                        </button>
                    </div>
                </div>

                <div class="card p-6 shadow-sm">
                    <h3 class="font-bold text-sm text-slate-500 mb-4">상세 변수 수동 조정</h3>
                    <div class="space-y-5">
                        <div>
                            <div class="flex justify-between text-xs mb-2"><span>합계출산율</span><span id="tfr-label" class="text-indigo-600 font-bold">0.72</span></div>
                            <input type="range" id="tfr-input" min="0.5" max="2.1" step="0.01" value="0.72" class="w-full accent-indigo-600 cursor-pointer">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-2"><span>연간 청년 유입(가중치)</span><span id="migration-label" class="text-indigo-600 font-bold">0</span></div>
                            <input type="range" id="migration-input" min="-5" max="15" step="1" value="0" class="w-full accent-indigo-600 cursor-pointer">
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="card p-8">
                    <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-8 gap-4">
                        <h2 class="text-xl font-bold text-slate-800 tracking-tight" id="chart-title">정책 적용 전 미래 인구 추계</h2>
                        <div class="flex gap-4">
                            <div class="flex items-center text-[10px] font-bold text-slate-600"><span class="w-3 h-3 bg-blue-500 rounded-full mr-1.5"></span> 유소년</div>
                            <div class="flex items-center text-[10px] font-bold text-slate-600"><span class="w-3 h-3 bg-indigo-400 rounded-full mr-1.5"></span> 생산인구</div>
                            <div class="flex items-center text-[10px] font-bold text-slate-600"><span class="w-3 h-3 bg-rose-400 rounded-full mr-1.5"></span> 고령인구</div>
                        </div>
                    </div>
                    <div style="height: 380px; width: 100%;">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="card p-6 border-t-4 border-indigo-500">
                        <h3 class="font-bold text-xs text-slate-400 mb-4 uppercase tracking-widest">2074년 정책 효과 분석</h3>
                        <div class="space-y-4">
                            <div class="flex justify-between items-end border-b pb-2">
                                <span class="text-xs text-slate-500">예상 총 인구</span>
                                <span class="font-bold text-slate-800 text-lg" id="stat-total">-</span>
                            </div>
                            <div class="flex justify-between items-end border-b pb-2">
                                <span class="text-xs text-slate-500">생산가능인구 비중</span>
                                <span class="font-bold text-indigo-600 text-lg" id="stat-work-ratio">-</span>
                            </div>
                            <div class="flex justify-between items-end border-b pb-2">
                                <span class="text-xs text-slate-500">노년 부양비</span>
                                <span class="font-bold text-rose-500 text-lg" id="stat-dependency">-</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-indigo-900 p-6 rounded-3xl text-white shadow-xl">
                        <h3 class="font-bold mb-2 flex items-center text-sm">
                            <span class="mr-2">📢</span> 정책 분석 리포트
                        </h3>
                        <p id="policy-report" class="text-[12px] leading-relaxed opacity-90 quest-item">
                            정책 시나리오를 선택하여 인구 변화의 차이를 확인해보세요.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('mainChart').getContext('2d');
        let chart;

        const INITIAL = { youth: 5700000, work: 36000000, elderly: 10050000 };

        function applyScenario(type) {
            // 버튼 활성화 스타일 제어
            document.querySelectorAll('.btn-policy').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');

            if (type === 'none') {
                document.getElementById('tfr-input').value = 0.72;
                document.getElementById('migration-input').value = 0;
                document.getElementById('chart-title').innerText = "현상 유지 시 미래 인구 추계";
                document.getElementById('policy-report').innerText = "현재의 낮은 출산율이 유지될 경우, 생산가능인구가 급격히 감소하여 부양 부담이 매우 높아집니다.";
            } else if (type === 'housing') {
                document.getElementById('tfr-input').value = 1.1; // 주거 안정으로 인한 소폭 상승
                document.getElementById('migration-input').value = 10; // 청년 유입 대폭 증가
                document.getElementById('chart-title').innerText = "청년 주거 지원 정책 적용 결과";
                document.getElementById('policy-report').innerText = "청년 유입이 늘어나면서 생산가능인구의 급격한 감소를 방어하는 효과가 큽니다. 출산율을 직접 높이지 않아도 구조적 안정을 돕습니다.";
            } else if (type === 'birth') {
                document.getElementById('tfr-input').value = 1.8; // 파격적 지원으로 출산율 대폭 상승
                document.getElementById('migration-input').value = 2; // 소폭 유입
                document.getElementById('chart-title').innerText = "출산 장려 정책 적용 결과";
                document.getElementById('policy-report').innerText = "장기적으로 유소년 인구가 늘어나 미래의 잠재력을 확보합니다. 하지만 정책 효과가 나타나기까지(유소년이 생산인구가 될 때까지) 약 20년 이상의 시간이 걸립니다.";
            }
            simulate();
        }

        function simulate() {
            const tfr = parseFloat(document.getElementById('tfr-input').value);
            const migration = parseFloat(document.getElementById('migration-input').value) * 10000;
            
            document.getElementById('tfr-label').innerText = tfr.toFixed(2);
            document.getElementById('migration-label').innerText = (migration/10000).toFixed(0);

            const years = [];
            const youthData = []; const workData = []; const elderlyData = [];

            let cy = INITIAL.youth; let cw = INITIAL.work; let ce = INITIAL.elderly;

            for (let i = 0; i <= 50; i++) {
                years.push(2024 + i);
                youthData.push(cy); workData.push(cw); elderlyData.push(ce);

                const birth = (cw * 0.45 * (tfr / 30));
                const yToW = cy / 15;
                const wToE = cw / 50;
                const death = ce / (83.6 - 65);

                cy = cy + birth - yToW;
                cw = cw + yToW - wToE + (migration * 0.9); // 유입 인구의 90%는 생산가능인구로 가정
                ce = ce + wToE - death + (migration * 0.1);

                if (cy < 0) cy = 0; if (cw < 0) cw = 0; if (ce < 0) ce = 0;
            }

            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [
                        { label: '고령', data: elderlyData, borderColor: '#fb7185', backgroundColor: 'rgba(251, 113, 133, 0.65)', fill: true, pointRadius: 0, stack: '1' },
                        { label: '생산', data: workData, borderColor: '#818cf8', backgroundColor: 'rgba(129, 140, 248, 0.65)', fill: true, pointRadius: 0, stack: '1' },
                        { label: '유소년', data: youthData, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.65)', fill: true, pointRadius: 0, stack: '1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { stacked: true, ticks: { callback: v => (v / 10000).toLocaleString() + '만' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            const lastIdx = years.length - 1;
            const total = youthData[lastIdx] + workData[lastIdx] + elderlyData[lastIdx];
            document.getElementById('stat-total').innerText = (total / 10000).toLocaleString(undefined, {maximumFractionDigits:0}) + "만 명";
            document.getElementById('stat-work-ratio').innerText = (workData[lastIdx] / total * 100).toFixed(1) + "%";
            document.getElementById('stat-dependency').innerText = (elderlyData[lastIdx] / workData[lastIdx]).toFixed(2) + "명";
        }

        document.getElementById('tfr-input').addEventListener('input', () => {
            document.querySelectorAll('.btn-policy').forEach(btn => btn.classList.remove('active'));
            simulate();
        });
        document.getElementById('migration-input').addEventListener('input', () => {
            document.querySelectorAll('.btn-policy').forEach(btn => btn.classList.remove('active'));
            simulate();
        });

        window.onload = () => applyScenario('none');
    </script>
</body>
</html>
